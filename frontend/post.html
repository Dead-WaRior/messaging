<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Post — Mini Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/base.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar-slot"></aside>

    <main>
      <a href="/feed.html" class="btn btn-ghost btn-sm" style="margin-bottom:12px;">← Back to feed</a>

      <div id="post-slot"></div>

      <div class="card" style="margin-top:16px;">
        <h3 style="margin-bottom:12px;">Comments</h3>
        <div id="comments-slot" class="text-muted" style="font-size:14px;">Loading…</div>

        <form id="comment-form" style="margin-top:16px;">
          <div class="row" style="align-items:flex-start;">
            <div id="me-avatar-slot"></div>
            <div class="grow">
              <textarea class="input" id="comment-content" placeholder="Add a comment…" maxlength="2000" required></textarea>
              <div style="display:flex; justify-content:flex-end; margin-top:8px;">
                <button class="btn btn-primary btn-sm" type="submit" id="comment-btn">Comment</button>
              </div>
            </div>
          </div>
        </form>
      </div>
    </main>

    <aside class="right-rail"></aside>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/post.js"></script>
</body>
</html>
